<article
  class="bg-white dark:bg-slate-800 rounded-xl shadow-sm overflow-hidden border border-slate-200 flex flex-col"
>
  <a [routerLink]="['/drink', drink.id]">
    <img
      [ngSrc]="'assets/images/' + drink.imageName"
      [width]="300"
      [height]="300"
      priority
      alt="{{ drink.name }}"
      class="p-4"
    />

    <div class="p-4 flex-1 flex flex-col gap-2">
      <div class="flex items-start justify-between gap-2">
        <h2 class="font-semibold text-slate-800 dark:text-slate-100">
          {{ drink.name }}
        </h2>

        <button
          type="button"
          (click)="toggleFavorite.emit(drink)"
          class="text-sm px-2 py-1 rounded-full border"
          [ngClass]="{
            'bg-brand text-white border-brand': drink.favorite,
            'text-slate-500 border-slate-300': !drink.favorite,
          }"
        >
          {{ drink.favorite ? 'مورد علاقه' : 'افزودن به علاقه‌مندی‌ها' }}
        </button>
      </div>

      <p class="text-xs text-slate-500 dark:text-slate-300">
        {{ drink.description }}
      </p>

      <div class="mt-auto flex items-center justify-between text-sm">
        <span class="font-semibold text-red-800 dark:text-slate-100">
          {{ drink.price }} تومان
        </span>
      </div>
    </div>
  </a>
</article>
