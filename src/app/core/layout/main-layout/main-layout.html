<div class="min-h-screen flex flex-col bg-slate-100">
  <!-- Header -->
  <header class="bg-white shadow-sm">
    <div class="mx-auto max-w-6xl px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <span class="font-semibold text-lg text-slate-800"
          ><img src="../../../../assets/logo/logo.png" class="w-25"
        /></span>
        <div class="flex gap-8 menu">
          <a routerLink="/" class="text-slate-600 hover:text-slate-900 cursor-pointer">خانه</a>
          <a [routerLink]="'/drinks'" class="text-slate-600 hover:text-slate-900 cursor-pointer"
            >نوشیدنی ها</a
          >
        </div>
      </div>

      <nav class="flex gap-4 text-sm items-center">
        <a
          routerLink="/login"
          class="flex items-center justify-center text-slate-700 bg-red-200 rounded-sm w-30 h-10 hover:text-white hover:bg-red-800 cursor-pointer transition-colors"
        >
          ورود | ثبت نام
        </a>
      </nav>
    </div>
  </header>

  <!-- Main content -->
  <main class="flex-1 mx-auto max-w-6xl px-4 py-6">
    <router-outlet></router-outlet>
  </main>

  <!-- Footer -->
  <footer class="bg-white border-t">
    <div class="mx-auto max-w-6xl px-4 py-3 text-xs text-slate-500 flex justify-between">
      <span>© {{ year }} Persian Drinks Hub</span>
      <span>Built with Angular 18 + Tailwind</span>
    </div>
  </footer>
</div>
