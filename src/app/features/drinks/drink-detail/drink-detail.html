<section class="space-y-4">
  <button
    type="button"
    (click)="goBack()"
    class="text-sm text-slate-600 hover:text-slate-900 flex items-center gap-1 cursor-pointer"
  >
    ← بازگشت به لیست
  </button>

  @if (!drink()) {
    <div class="text-center text-slate-500">در حال بارگذاری جزئیات نوشیدنی...</div>
  } @else {
    <div
      class="bg-white dark:bg-slate-800 rounded-xl shadow-sm overflow-hidden border border-slate-200"
    >
      <div class="grid grid-cols-1 md:grid-cols-2">
        <img
          [src]="'assets/images/' + drink()!.imageName"
          [alt]="drink()!.name"
          class="object-cover h-50 p-4"
        />

        <div class="p-6 flex flex-col gap-4">
          <div class="flex items-start justify-between gap-2">
            <div>
              <h1 class="text-2xl font-semibold text-slate-800 dark:text-slate-100">
                {{ drink()!.name }}
              </h1>
              <p class="text-xs text-slate-500 dark:text-slate-300 mt-1">
                نوع: {{ drink()!.type }} – منطقه: {{ drink()!.region }}
              </p>
            </div>

            <span
              class="text-sm px-3 py-1 rounded-full border"
              [ngClass]="{
                'bg-brand text-white border-brand': drink()!.favorite,
                'text-slate-600 border-slate-300 bg-white': !drink()!.favorite,
              }"
            >
              {{ drink()!.favorite ? 'مورد علاقه' : 'معمولی' }}
            </span>
          </div>

          <p class="text-sm text-slate-700 dark:text-slate-200 leading-relaxed">
            {{ drink()!.description }}
          </p>

          <div class="mt-auto flex items-center justify-between">
            <span class="text-lg font-semibold text-red-800 dark:text-slate-50">
              {{ drink()!.price }} تومان
            </span>

            <a routerLink="/drinks" class="text-sm text-brand hover:underline cursor-pointer">
              دیدن سایر نوشیدنی‌ها
            </a>
          </div>
        </div>
      </div>
    </div>
  }
</section>
